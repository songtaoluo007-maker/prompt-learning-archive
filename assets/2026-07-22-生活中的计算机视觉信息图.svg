<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">生活中的计算机视觉</title>
  <desc id="desc">人脸解锁、扫码支付、交通摄像头、智能相册分类与自动驾驶辅助五个案例的信息图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f29"/>
      <stop offset=".55" stop-color="#183f36"/>
      <stop offset="1" stop-color="#0d2824"/>
    </linearGradient>
    <radialGradient id="eyeGlow">
      <stop offset="0" stop-color="#e3bb7c" stop-opacity=".42"/>
      <stop offset=".55" stop-color="#65b6a5" stop-opacity=".16"/>
      <stop offset="1" stop-color="#65b6a5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#061713" flood-opacity=".32"/>
    </filter>
    <style>
      text{font-family:"Microsoft YaHei","PingFang SC",sans-serif}
      .case-card{fill:#f5f2e9;stroke:#d9cdb8;stroke-width:2}
      .case-kicker{font-size:13px;font-weight:800;letter-spacing:2px;fill:#a24631}
      .case-title{font-size:25px;font-weight:800;fill:#20362f}
      .stage-box{fill:#e7ece7;stroke:#cbd6cf}
      .stage-box.detect{fill:#d8e9e3;stroke:#8eb8aa}
      .stage-box.output{fill:#f0e1d2;stroke:#d5ad8c}
      .stage{font-size:13px;font-weight:800;text-anchor:middle;fill:#355047}
      .arrow{font-size:19px;font-weight:900;text-anchor:middle;fill:#a24631}
      .description{font-size:13px;fill:#647169}
      .connector{fill:none;stroke:#90bdaf;stroke-width:2;stroke-dasharray:6 8;opacity:.55}
      .node{fill:#e2bd7f;stroke:#173b33;stroke-width:4}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 118H1600M0 884H1600" stroke="#fff" stroke-opacity=".06"/>
  <circle cx="800" cy="430" r="290" fill="url(#eyeGlow)"/>
  <text x="80" y="72" font-size="44" font-weight="900" fill="#f6f1e7">生活中的计算机视觉</text>
  <text x="82" y="105" font-size="17" letter-spacing="4" fill="#a9c5bc">像素进入 · 特征被识别 · 决策走向现实</text>
  <text x="1518" y="78" text-anchor="end" font-size="16" font-weight="800" fill="#e3bb7c">COMPUTER VISION / 05</text>

  <path class="connector" d="M500 280C610 290 635 340 680 380"/>
  <path class="connector" d="M1100 280C990 290 965 340 920 380"/>
  <path class="connector" d="M500 595C610 580 640 520 684 482"/>
  <path class="connector" d="M1100 595C990 580 960 520 916 482"/>
  <path class="connector" d="M800 670V535"/>
  <circle class="node" cx="500" cy="280" r="7"/><circle class="node" cx="1100" cy="280" r="7"/>
  <circle class="node" cx="500" cy="595" r="7"/><circle class="node" cx="1100" cy="595" r="7"/><circle class="node" cx="800" cy="670" r="7"/>

  <g transform="translate(620 324)">
    <path d="M0 106C70 5 290 5 360 106C290 207 70 207 0 106Z" fill="#f4efe4" stroke="#83b6a7" stroke-width="4" filter="url(#shadow)"/>
    <circle cx="180" cy="106" r="75" fill="#2f6657"/>
    <circle cx="180" cy="106" r="48" fill="#0e2e28" stroke="#e2bd7f" stroke-width="7"/>
    <circle cx="162" cy="85" r="12" fill="#fff" fill-opacity=".88"/>
    <path d="M180 60V35M180 177v-25M134 106h-25M251 106h-25" stroke="#8ed1c0" stroke-width="4" stroke-linecap="round"/>
    <text x="180" y="232" text-anchor="middle" font-size="15" font-weight="800" letter-spacing="3" fill="#d9e8e2">AI 视觉眼</text>
  </g>

  <g class="cv-case" transform="translate(70 155)" filter="url(#shadow)">
    <rect width="430" height="190" rx="18" class="case-card"/>
    <text x="24" y="30" class="case-kicker">01 · IDENTITY</text>
    <text x="24" y="61" class="case-title">人脸解锁</text>
    <rect x="24" y="78" width="106" height="38" rx="8" class="stage-box"/>
    <rect x="162" y="78" width="106" height="38" rx="8" class="stage-box detect"/>
    <rect x="300" y="78" width="106" height="38" rx="8" class="stage-box output"/>
    <text x="77" y="103" class="stage">输入画面</text><text x="146" y="104" class="arrow">→</text>
    <text x="215" y="103" class="stage">AI识别内容</text><text x="284" y="104" class="arrow">→</text>
    <text x="353" y="103" class="stage">输出结果</text>
    <text x="24" y="143" class="description"><tspan x="24">前置摄像头面部帧 → 关键点、身份特征、活体迹象</tspan><tspan x="24" dy="22">→ 匹配则解锁，未通过则拒绝访问</tspan></text>
  </g>

  <g class="cv-case" transform="translate(1100 155)" filter="url(#shadow)">
    <rect width="430" height="190" rx="18" class="case-card"/>
    <text x="24" y="30" class="case-kicker">02 · PAYMENT</text>
    <text x="24" y="61" class="case-title">扫码支付</text>
    <rect x="24" y="78" width="106" height="38" rx="8" class="stage-box"/>
    <rect x="162" y="78" width="106" height="38" rx="8" class="stage-box detect"/>
    <rect x="300" y="78" width="106" height="38" rx="8" class="stage-box output"/>
    <text x="77" y="103" class="stage">输入画面</text><text x="146" y="104" class="arrow">→</text>
    <text x="215" y="103" class="stage">AI识别内容</text><text x="284" y="104" class="arrow">→</text>
    <text x="353" y="103" class="stage">输出结果</text>
    <text x="24" y="143" class="description"><tspan x="24">二维码图像 → 位置、边界、编码内容与有效性</tspan><tspan x="24" dy="22">→ 解析商户或订单信息并进入支付确认</tspan></text>
  </g>

  <g class="cv-case" transform="translate(70 510)" filter="url(#shadow)">
    <rect width="430" height="190" rx="18" class="case-card"/>
    <text x="24" y="30" class="case-kicker">03 · TRAFFIC</text>
    <text x="24" y="61" class="case-title">交通摄像头</text>
    <rect x="24" y="78" width="106" height="38" rx="8" class="stage-box"/>
    <rect x="162" y="78" width="106" height="38" rx="8" class="stage-box detect"/>
    <rect x="300" y="78" width="106" height="38" rx="8" class="stage-box output"/>
    <text x="77" y="103" class="stage">输入画面</text><text x="146" y="104" class="arrow">→</text>
    <text x="215" y="103" class="stage">AI识别内容</text><text x="284" y="104" class="arrow">→</text>
    <text x="353" y="103" class="stage">输出结果</text>
    <text x="24" y="143" class="description"><tspan x="24">路口连续视频 → 车辆、行人、车道、信号与异常</tspan><tspan x="24" dy="22">→ 流量统计、违章记录、拥堵预警或信号优化</tspan></text>
  </g>

  <g class="cv-case" transform="translate(1100 510)" filter="url(#shadow)">
    <rect width="430" height="190" rx="18" class="case-card"/>
    <text x="24" y="30" class="case-kicker">04 · ALBUM</text>
    <text x="24" y="61" class="case-title">智能相册分类</text>
    <rect x="24" y="78" width="106" height="38" rx="8" class="stage-box"/>
    <rect x="162" y="78" width="106" height="38" rx="8" class="stage-box detect"/>
    <rect x="300" y="78" width="106" height="38" rx="8" class="stage-box output"/>
    <text x="77" y="103" class="stage">输入画面</text><text x="146" y="104" class="arrow">→</text>
    <text x="215" y="103" class="stage">AI识别内容</text><text x="284" y="104" class="arrow">→</text>
    <text x="353" y="103" class="stage">输出结果</text>
    <text x="24" y="143" class="description"><tspan x="24">用户照片与拍摄信息 → 人物、物体、地点、时间关系</tspan><tspan x="24" dy="22">→ 自动相册、关键词搜索和回忆推荐</tspan></text>
  </g>

  <g class="cv-case" transform="translate(585 685)" filter="url(#shadow)">
    <rect width="430" height="175" rx="18" class="case-card"/>
    <text x="24" y="30" class="case-kicker">05 · MOBILITY</text>
    <text x="24" y="61" class="case-title">自动驾驶辅助</text>
    <rect x="24" y="76" width="106" height="36" rx="8" class="stage-box"/>
    <rect x="162" y="76" width="106" height="36" rx="8" class="stage-box detect"/>
    <rect x="300" y="76" width="106" height="36" rx="8" class="stage-box output"/>
    <text x="77" y="100" class="stage">输入画面</text><text x="146" y="101" class="arrow">→</text>
    <text x="215" y="100" class="stage">AI识别内容</text><text x="284" y="101" class="arrow">→</text>
    <text x="353" y="100" class="stage">输出结果</text>
    <text x="24" y="137" class="description"><tspan x="24">车辆多摄像头视频 → 车道、行人、标志与运动趋势</tspan><tspan x="24" dy="21">→ 碰撞预警、自动刹车、车道保持或驾驶提示</tspan></text>
  </g>

  <text x="1525" y="852" text-anchor="end" font-size="13" letter-spacing="2" fill="#92b3a8">INPUT → PERCEPTION → ACTION</text>
</svg>
