<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Codex AI 编辑实验记录</title>
  <desc id="desc">十条校园短文本分类实验的用户指令、AI 输出摘要和人工复核记录。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3028"/>
      <stop offset=".55" stop-color="#183f35"/>
      <stop offset="1" stop-color="#0b2621"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f1ede2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#061712" flood-opacity=".35"/>
    </filter>
    <style>
      text{font-family:"Microsoft YaHei","PingFang SC",sans-serif}
      .kicker{font:800 14px Consolas,monospace;letter-spacing:3px;fill:#d8a85e}
      .title{font-size:46px;font-weight:900;fill:#fffaf0}
      .subtitle{font-size:17px;fill:#b7cec6}
      .card-title{font-size:14px;font-weight:900;letter-spacing:2px;fill:#a74632}
      .card-heading{font-size:27px;font-weight:900;fill:#20352f}
      .body{font-size:16px;fill:#4f5f58}
      .small{font-size:13px;fill:#758078}
      .count{font-size:42px;font-weight:900;fill:#173d33}
      .count-label{font-size:14px;font-weight:800;fill:#596861}
      .chip{font-size:13px;font-weight:800;text-anchor:middle;fill:#fff}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <path d="M0 126H1600M0 914H1600" stroke="#fff" stroke-opacity=".07"/>
  <circle cx="1480" cy="80" r="240" fill="none" stroke="#fff" stroke-opacity=".04" stroke-width="58"/>
  <circle cx="130" cy="880" r="180" fill="none" stroke="#d8a85e" stroke-opacity=".06" stroke-width="42"/>

  <text x="78" y="58" class="kicker">D06 / AI EDITOR EXPERIMENT</text>
  <text x="78" y="110" class="title">Codex AI 编辑实验记录</text>
  <text x="1522" y="101" text-anchor="end" class="subtitle">10 条文本 · 三类标签 · 两条边界样本</text>

  <g transform="translate(70 170)" filter="url(#shadow)">
    <rect width="435" height="650" rx="22" fill="url(#card)" stroke="#d6cebc" stroke-width="2"/>
    <rect width="435" height="12" rx="6" fill="#a74632"/>
    <text x="30" y="58" class="card-title">INPUT / 用户指令</text>
    <text x="30" y="101" class="card-heading">建立编辑分类标准</text>
    <line x1="30" y1="127" x2="405" y2="127" stroke="#d7d0c3"/>

    <text x="30" y="170" class="body">
      <tspan x="30">请将以下 10 条校园短文本按</tspan>
      <tspan x="30" dy="29">“通知公告 / 宣传报道 / 咨询提问”</tspan>
      <tspan x="30" dy="29">进行分类。</tspan>
    </text>
    <text x="30" y="282" class="body">
      <tspan x="30">每条给出 3—5 个关键词和简短理由，</tspan>
      <tspan x="30" dy="29">并标记至少 2 条边界样本。</tspan>
    </text>

    <rect x="30" y="375" width="375" height="74" rx="12" fill="#e7ece7"/>
    <text x="52" y="406" class="small">分类依据</text>
    <text x="52" y="434" class="body" font-weight="800">主要交际功能，而不是新闻主题</text>

    <text x="30" y="502" class="card-title">REQUIRED OUTPUT</text>
    <g transform="translate(30 527)">
      <circle cx="10" cy="10" r="10" fill="#2d6a59"/><text x="10" y="15" text-anchor="middle" font-size="12" fill="#fff">✓</text>
      <text x="31" y="15" class="body">原文与分类标签</text>
      <circle cx="10" cy="53" r="10" fill="#2d6a59"/><text x="10" y="58" text-anchor="middle" font-size="12" fill="#fff">✓</text>
      <text x="31" y="58" class="body">关键词与分类理由</text>
      <circle cx="10" cy="96" r="10" fill="#2d6a59"/><text x="10" y="101" text-anchor="middle" font-size="12" fill="#fff">✓</text>
      <text x="31" y="101" class="body">歧义样本与人工复核</text>
    </g>
  </g>

  <g transform="translate(582 170)" filter="url(#shadow)">
    <rect width="435" height="650" rx="22" fill="url(#card)" stroke="#d6cebc" stroke-width="2"/>
    <rect width="435" height="12" rx="6" fill="#2d6a59"/>
    <text x="30" y="58" class="card-title">AI RESULT / 输出摘要</text>
    <text x="30" y="101" class="card-heading">完成 10 条文本初筛</text>
    <line x1="30" y1="127" x2="405" y2="127" stroke="#d7d0c3"/>

    <g transform="translate(30 158)">
      <rect width="112" height="128" rx="14" fill="#dde9e3"/>
      <text x="56" y="61" text-anchor="middle" class="count">4</text>
      <text x="56" y="94" text-anchor="middle" class="count-label">通知公告</text>
      <rect x="131" width="112" height="128" rx="14" fill="#eee2d8"/>
      <text x="187" y="61" text-anchor="middle" class="count">3</text>
      <text x="187" y="94" text-anchor="middle" class="count-label">宣传报道</text>
      <rect x="262" width="112" height="128" rx="14" fill="#e8e9dd"/>
      <text x="318" y="61" text-anchor="middle" class="count">3</text>
      <text x="318" y="94" text-anchor="middle" class="count-label">咨询提问</text>
    </g>

    <text x="30" y="343" class="card-title">BOUNDARY SAMPLES</text>
    <rect x="30" y="365" width="375" height="104" rx="14" fill="#173d33"/>
    <rect x="50" y="389" width="78" height="34" rx="17" fill="#a74632"/>
    <text x="89" y="411" class="chip">T02</text>
    <rect x="143" y="389" width="78" height="34" rx="17" fill="#a74632"/>
    <text x="182" y="411" class="chip">T08</text>
    <text x="50" y="451" font-size="14" fill="#dce8e3">同时具备通知与宣传特征</text>

    <text x="30" y="515" class="card-title">KEY SIGNALS</text>
    <text x="30" y="550" class="body">
      <tspan x="30">时间 · 截止日期 · 行动要求</tspan>
      <tspan x="30" dy="31">成绩 · 评价词 · 疑问句</tspan>
      <tspan x="30" dy="31">号召语 · 比喻表达</tspan>
    </text>
  </g>

  <g transform="translate(1094 170)" filter="url(#shadow)">
    <rect width="435" height="650" rx="22" fill="url(#card)" stroke="#d6cebc" stroke-width="2"/>
    <rect width="435" height="12" rx="6" fill="#d8a85e"/>
    <text x="30" y="58" class="card-title">REVIEW / 人工复核</text>
    <text x="30" y="101" class="card-heading">保留边界，不强行归一</text>
    <line x1="30" y1="127" x2="405" y2="127" stroke="#d7d0c3"/>

    <text x="30" y="170" class="body">
      <tspan x="30">分类标准依据文本的主要交际功能，</tspan>
      <tspan x="30" dy="29">而不是新闻主题。</tspan>
    </text>
    <rect x="30" y="238" width="375" height="134" rx="14" fill="#f0e1d3" stroke="#ddb89a"/>
    <text x="52" y="273" class="card-title">T02 / 体验周</text>
    <text x="52" y="304" class="body">
      <tspan x="52">日期与任务指向通知；积极表达</tspan>
      <tspan x="52" dy="27">又带有推广工具的宣传意味。</tspan>
    </text>
    <rect x="30" y="392" width="375" height="134" rx="14" fill="#f0e1d3" stroke="#ddb89a"/>
    <text x="52" y="427" class="card-title">T08 / 志愿者招募</text>
    <text x="52" y="458" class="body">
      <tspan x="52">岗位与截止时间指向通知；号召句</tspan>
      <tspan x="52" dy="27">和比喻表达又接近宣传文案。</tspan>
    </text>

    <rect x="30" y="556" width="375" height="62" rx="12" fill="#e2e9e4"/>
    <text x="52" y="583" class="small">结论</text>
    <text x="52" y="608" class="body" font-weight="800">AI 初筛 + 边界样本人工复核</text>
  </g>

  <g stroke="#d8a85e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M523 487H556"/><path d="M545 476L556 487L545 498"/>
    <path d="M1035 487H1068"/><path d="M1057 476L1068 487L1057 498"/>
  </g>

  <rect x="70" y="853" width="1459" height="104" rx="16" fill="#0b211d" stroke="#fff" stroke-opacity=".1"/>
  <text x="100" y="889" class="kicker">记录说明</text>
  <text x="100" y="927" font-size="16" fill="#d7e5df">本图由当前 Codex 分类对话整理，不代表第三方软件界面。</text>
  <text x="1500" y="922" text-anchor="end" font-size="13" letter-spacing="2" fill="#91ada4">2026.07.23 / D06 / AI EDITOR EXPERIMENT</text>
</svg>
