<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<title>提示词学习档案</title>
<style>
  :root{--canvas:#E9ECE8;--paper:#FBFCF9;--ink:#202722;--muted:#707871;--line:#D7DCD6;--pine:#253B34;--pine-2:#315C4E;--vermilion:#A3412E;--warm:#D9B78D;--rail:218px;--catalog:286px;--header:78px}
  *{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--canvas);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}button,input{font:inherit}button:focus-visible,a:focus-visible,input:focus-visible{outline:3px solid rgba(163,65,46,.18);outline-offset:2px}
  .app{display:grid;grid-template-columns:calc(var(--rail) + var(--catalog)) minmax(0,1fr);width:100%;height:100%}
  .nav-shell{display:grid;grid-template-columns:var(--rail) var(--catalog);min-width:0;min-height:0;z-index:30;box-shadow:12px 0 32px rgba(32,39,34,.07)}
  .date-rail{position:relative;display:flex;flex-direction:column;min-width:0;background:var(--pine);color:#EFF3EF;border-right:1px solid rgba(255,255,255,.1)}
  .brand{height:var(--header);display:flex;align-items:center;gap:11px;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.12)}
  .seal{display:grid;place-items:center;width:38px;height:38px;background:var(--vermilion);color:#fff;font:800 13px/1 Georgia,serif;box-shadow:0 7px 18px rgba(0,0,0,.18)}
  .brand b{display:block;font-family:STZhongsong,"Songti SC",SimSun,serif;font-size:15px;letter-spacing:.5px}.brand span{display:block;margin-top:2px;color:#AFC0B9;font-size:9px;letter-spacing:.4px}
  .month{padding:25px 20px 15px}.month small{display:block;color:#9FB2AA;font:700 9px/1 "Cascadia Mono",Consolas,monospace;letter-spacing:1.7px}.month strong{display:block;margin-top:8px;font:400 34px/1 Georgia,serif;letter-spacing:-1px}.month span{display:block;margin-top:4px;color:#C6D1CD;font-size:10px}
  .date-list{position:relative;display:grid;gap:2px;padding:8px 12px 18px}.date-list::before{content:"";position:absolute;left:33px;top:25px;bottom:35px;width:1px;background:rgba(255,255,255,.18)}
  .date-btn{position:relative;width:100%;display:grid;grid-template-columns:44px 1fr;gap:10px;align-items:center;padding:12px 8px;border:0;background:transparent;color:#BCC9C4;text-align:left;cursor:pointer}.date-btn::before{content:"";position:absolute;left:17px;top:27px;width:7px;height:7px;border-radius:50%;background:#71867D;box-shadow:0 0 0 5px var(--pine)}.date-btn:hover{color:#fff}.date-btn.active{color:#fff}.date-btn.active::before{background:#F2D9C8;box-shadow:0 0 0 5px var(--pine),0 0 0 7px var(--vermilion)}
  .date-day{padding-left:23px;font:700 10px/1 "Cascadia Mono",Consolas,monospace}.date-copy b{display:block;font:400 18px/1 Georgia,serif}.date-copy span{display:block;margin-top:5px;color:#9FB2AA;font-size:9.5px}.date-btn.active .date-copy span{color:#D6E0DC}.today{display:inline-block;margin-left:5px;color:#F2D9C8;font-size:8px;font-weight:800;vertical-align:2px}
  .rail-note{margin-top:auto;padding:18px 20px 22px;border-top:1px solid rgba(255,255,255,.12);color:#9FB2AA;font-size:9.5px;line-height:1.7}.rail-note b{display:block;margin-bottom:5px;color:#D5DFDB;font-size:10px}
  .catalog{display:flex;flex-direction:column;min-width:0;min-height:0;background:#F6F7F3;border-right:1px solid var(--line)}
  .catalog-head{height:var(--header);display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line)}.catalog-head small{display:block;color:#929A93;font-size:9px;letter-spacing:1px}.catalog-head b{display:block;margin-top:3px;font-family:STZhongsong,"Songti SC",SimSun,serif;font-size:15px}.catalog-count{font:700 10px "Cascadia Mono",Consolas,monospace;color:#929A93}.close-nav{display:none;width:34px;height:34px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer}
  .search{padding:14px 14px 8px}.search-box{position:relative}.search input{width:100%;height:34px;padding:0 12px 0 31px;border:0;border-bottom:1px solid #C8CEC8;background:transparent;color:var(--ink)}.search input:focus{border-color:var(--vermilion);outline:0}.search input::placeholder{color:#9AA29B}.search-icon{position:absolute;left:8px;top:8px;color:#9AA29B;font-size:12px}
  .task-nav{flex:1;min-height:0;overflow:auto;padding:2px 12px 20px;scrollbar-width:thin;scrollbar-color:#C8CEC8 transparent}.group{margin-top:15px}.group-head{display:flex;justify-content:space-between;padding:0 7px 7px;color:#8A928B;font-size:9px;font-weight:800;letter-spacing:.45px}.group-head span:last-child{font-family:"Cascadia Mono",Consolas,monospace;color:#A4ABA5}
  .task-list{display:grid;gap:1px}.task-btn{position:relative;width:100%;display:grid;grid-template-columns:30px minmax(0,1fr) 18px;gap:8px;align-items:center;padding:9px 8px;border:0;background:transparent;color:#5C655E;text-align:left;cursor:pointer}.task-btn::before{content:"";position:absolute;left:-12px;top:6px;bottom:6px;width:3px;background:transparent}.task-btn:hover{background:#ECEFEA;color:var(--ink)}.task-btn.active{background:#E8ECE7;color:var(--ink)}.task-btn.active::before{background:var(--vermilion)}
  .num{font:700 9px/1 "Cascadia Mono",Consolas,monospace;color:#979F98}.task-btn.active .num{color:var(--vermilion)}.task-copy{min-width:0}.task-copy b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px}.task-copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;color:#929A93;font-size:9px}.done-dot{width:14px;height:14px;border:1px solid #C6CDC7;border-radius:50%;color:transparent;text-align:center;font-size:8px;line-height:12px}.task-btn.done .done-dot{border-color:var(--pine-2);background:var(--pine-2);color:#fff}.empty{padding:36px 10px;color:#939B94;text-align:center;font-size:10px}
  .catalog-foot{padding:13px 18px 17px;border-top:1px solid var(--line);background:#F3F5F1}.progress-meta{display:flex;justify-content:space-between;color:#7F8881;font-size:9px}.progress{height:2px;margin-top:9px;background:#D6DBD5}.progress i{display:block;width:0;height:100%;background:var(--vermilion);transition:width .2s}.backup{margin-top:9px;color:#9DA49E;font-size:8.5px}
  .workspace{display:grid;grid-template-rows:var(--header) minmax(0,1fr);min-width:0;min-height:0;background:var(--canvas)}
  .topbar{display:flex;align-items:center;gap:15px;padding:0 22px;background:var(--paper);border-bottom:1px solid var(--line)}.menu{display:none;width:38px;height:38px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer}.title-block{min-width:0}.breadcrumb{display:flex;gap:7px;color:#8A928B;font-size:9px}.breadcrumb i{font-style:normal;color:#B3BAB4}.current-title{margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:STZhongsong,"Songti SC",SimSun,serif;font-size:18px;font-weight:700}.actions{margin-left:auto;display:flex;align-items:center;gap:4px}.action{height:34px;min-width:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 9px;border:0;border-left:1px solid var(--line);background:transparent;color:#616A63;text-decoration:none;cursor:pointer;font-size:10px}.action:hover{color:var(--vermilion)}.action.primary{border:1px solid #BFC8C1;background:#F3F5F1;color:var(--pine);margin-right:6px}.action.primary.done{border-color:var(--pine-2);background:var(--pine-2);color:#fff}.action:disabled{opacity:.28;cursor:default}.action .text{white-space:nowrap}.chapter{margin-left:8px;color:#8D958E;font:700 9px "Cascadia Mono",Consolas,monospace}
  .viewer{position:relative;min-width:0;min-height:0;padding:14px;background:var(--canvas)}.paper{width:100%;height:100%;overflow:hidden;background:var(--paper);border:1px solid #D2D8D2;box-shadow:0 8px 28px rgba(32,39,34,.06)}iframe{display:block;width:100%;height:100%;border:0;background:var(--paper)}.loading{position:absolute;inset:14px;z-index:5;display:grid;place-items:center;background:#F2F4F0;color:#737C74;transition:opacity .16s}.loading.hide{opacity:0;pointer-events:none}.loader-line{width:110px;height:2px;overflow:hidden;background:#D5DAD4}.loader-line::after{content:"";display:block;width:45%;height:100%;background:var(--vermilion);animation:load 1s ease-in-out infinite}@keyframes load{from{transform:translateX(-110%)}to{transform:translateX(250%)}}.loading span{display:block;margin-top:11px;text-align:center;font-size:9px;letter-spacing:.8px}
  .mask{display:none;position:fixed;inset:0;z-index:25;background:rgba(28,40,34,.48);backdrop-filter:blur(2px)}.toast{position:fixed;left:50%;bottom:20px;z-index:80;transform:translate(-50%,18px);padding:9px 13px;background:var(--pine);color:#fff;opacity:0;pointer-events:none;font-size:10px;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
  @media(max-width:1120px){:root{--rail:190px;--catalog:260px}.date-copy b{font-size:16px}.actions .text{display:none}.action{padding:0 8px}}
  @media(max-width:820px){.app{display:block}.nav-shell{position:fixed;inset:0 auto 0 0;grid-template-columns:200px 286px;width:min(486px,92vw);transform:translateX(-102%);transition:transform .22s ease;box-shadow:18px 0 45px rgba(32,39,34,.22)}.nav-shell.open{transform:none}.mask.show{display:block}.workspace{height:100%}.menu,.close-nav{display:block}.topbar{padding:0 12px}.viewer{padding:8px}.loading{inset:8px}.chapter{display:none}}
  @media(max-width:520px){:root{--header:64px}.nav-shell{grid-template-columns:160px minmax(0,1fr);width:94vw}.brand{padding:0 12px}.brand-copy span{display:none}.month{padding:20px 14px 12px}.date-list{padding-left:6px;padding-right:6px}.date-btn{grid-template-columns:36px 1fr}.date-copy b{font-size:14px}.rail-note{padding:14px}.current-title{font-size:15px}.action.primary{margin-right:0}.actions .action:nth-of-type(2),.actions .action:nth-of-type(3){display:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <nav class="nav-shell" id="navShell" aria-label="学习档案导航">
    <section class="date-rail">
      <div class="brand"><div class="seal">PE</div><div><b>学习档案</b><span>PROMPT ENGINEERING</span></div></div>
      <div class="month"><small>LEARNING ARCHIVE</small><strong>JUL</strong><span>2026 · 三日成果</span></div>
      <div class="date-list" id="dateList"></div>
      <div class="rail-note"><b>原始成果安全保留</b>展示副本单独维护，任何界面修改都不会覆盖原始备份。</div>
    </section>
    <section class="catalog">
      <header class="catalog-head"><div><small id="catalogDate"></small><b id="catalogLabel"></b></div><div style="display:flex;align-items:center;gap:8px"><span class="catalog-count" id="catalogCount"></span><button class="close-nav" id="closeNav">×</button></div></header>
      <div class="search"><div class="search-box"><span class="search-icon">⌕</span><input id="search" type="search" placeholder="搜索本日任务" aria-label="搜索本日任务"></div></div>
      <div class="task-nav" id="taskNav"></div>
      <footer class="catalog-foot"><div class="progress-meta"><span>阅读标记</span><b id="progressText">0 / 0</b></div><div class="progress"><i id="progressFill"></i></div><div class="backup">完成状态仅保存在当前浏览器。</div></footer>
    </section>
  </nav>
  <div class="mask" id="mask"></div>
  <section class="workspace">
    <header class="topbar"><button class="menu" id="menu">☰</button><div class="title-block"><div class="breadcrumb"><span id="crumbDate"></span><i>/</i><span id="crumbGroup"></span></div><div class="current-title" id="currentTitle"></div></div><div class="actions"><button class="action primary" id="complete">✓ <span class="text">标记完成</span></button><button class="action" id="prev" aria-label="上一章">←</button><button class="action" id="next" aria-label="下一章">→</button><a class="action" id="standalone" target="_blank">↗ <span class="text">独立打开</span></a><a class="action" id="video" href="assets/2026-07-17-最后一班车.mp4" target="_blank" hidden>▶ <span class="text">概念样片</span></a><span class="chapter" id="chapter"></span></div></header>
    <main class="viewer"><div class="paper"><iframe id="frame" title="任务成果内容" allow="fullscreen"></iframe></div><div class="loading" id="loading"><div><div class="loader-line"></div><span>LOADING ARCHIVE</span></div></div></main>
  </section>
</div>
<div class="toast" id="toast"></div>
<script>
  const DAYS={
    '2026-07-16':{day:'01',date:'07.16',full:'2026年7月16日',label:'第一天 · 原始成果',source:'archives/2026-07-16-第一天任务成果.html',groups:[
      {title:'任务一 · 技巧全景图',items:[['p-principles','核心原则','三大提示词原则'],['p-basic','基础技巧','角色、指令与格式'],['p-advanced','进阶技巧','少样本与思维链'],['p-structure','结构化技巧','复杂任务拆解'],['p-scenario','场景适配','不同任务的选择'],['p-flow','决策流程','提示词选择路径'],['p-mistakes','常见误区','错误写法与修正']]},
      {title:'任务二 · 深度思考',items:[['p2-intro','问题提出','提示词优化的本质'],['p2-core','核心判断','人机信息传递'],['p2-compare','零样本 vs 少样本','模式对齐'],['p2-case','真实案例','开发场景复盘'],['p2-essence','本质总结','信道效率'],['p2-conclusion','结语','实践方法']]},
      {title:'任务三 · 迭代实践',items:[['p3-scene','场景说明','认证与权限模块'],['p3-v1','第1轮 · 初稿','模糊零样本'],['p3-v2','第2轮 · 添加角色','角色与技术栈'],['p3-v3','第3轮 · 细化约束','格式与功能'],['p3-v4','第4轮 · 精稿','少样本与测试'],['p3-summary','迭代总结','技巧应用分析']]}
    ]},
    '2026-07-17':{day:'02',date:'07.17',full:'2026年7月17日',label:'第二天 · 课程作业',source:'archives/2026-07-17-今日任务成果.html',groups:[
      {title:'当日总览',items:[['overview','今日作业总览','三项交付成果']]},
      {title:'任务一 · 理论可视化',items:[['task1','提示词结构拆解','8个控制模块与速查模板']]},
      {title:'任务二 · 深度思考',items:[['task2','AI 看见的不同世界','模型理解与失败诊断']]},
      {title:'任务三 · 实战创作',items:[['task3','《最后一班车》短剧','五镜头、迭代与概念样片',true]]}
    ]},
    '2026-07-20':{day:'03',date:'07.20',full:'2026年7月20日',label:'第三天 · 神经网络学习',today:true,source:'archives/2026-07-20-神经网络作业成果.html',groups:[
      {title:'当日总览',items:[['overview','今日作业总览','神经网络如何从错误中学习']]},
      {title:'任务一 · 理论可视化',items:[['task1','神经网络工作全景图','训练闭环与推理路径']]},
      {title:'任务二 · 深度思考',items:[['task2','AI 如何学会一件事','理解、泛化与幻觉']]},
      {title:'任务三 · 工具探索',items:[['task3','合唱团排练类比','复现反向传播与梯度下降']]}
    ]}
  };
  const $=s=>document.querySelector(s),frame=$('#frame'),loading=$('#loading'),navShell=$('#navShell'),mask=$('#mask');let completed=new Set(JSON.parse(localStorage.getItem('promptArchive.done')||'[]'));let state={date:'2026-07-20',page:'overview'},loadTimer=0;
  const items=(date=state.date)=>DAYS[date].groups.flatMap(g=>g.items.map(item=>({group:g.title,item})));const k=(d,p)=>`${d}/${p}`;
  function readHash(){const [d,p]=location.hash.slice(1).split('/');if(DAYS[d]){state.date=d;const list=items(d);state.page=list.some(x=>x.item[0]===p)?p:list[0].item[0]}}
  function drawDates(){$('#dateList').innerHTML=Object.entries(DAYS).map(([id,d])=>`<button class="date-btn ${id===state.date?'active':''}" data-date="${id}"><span class="date-day">D${d.day}</span><span class="date-copy"><b>${d.date}${d.today?'<em class="today">TODAY</em>':''}</b><span>${d.label}</span></span></button>`).join('');document.querySelectorAll('[data-date]').forEach(b=>b.onclick=()=>changeDate(b.dataset.date))}
  function drawTasks(q=''){q=q.trim().toLowerCase();let n=0;$('#taskNav').innerHTML=DAYS[state.date].groups.map(g=>{const list=g.items.filter(i=>!q||(i[1]+i[2]).toLowerCase().includes(q));if(!list.length)return'';n+=list.length;return`<section class="group"><div class="group-head"><span>${g.title}</span><span>${list.length}</span></div><div class="task-list">${list.map((i,j)=>`<button class="task-btn ${i[0]===state.page?'active':''} ${completed.has(k(state.date,i[0]))?'done':''}" data-page="${i[0]}"><span class="num">${String(j+1).padStart(2,'0')}</span><span class="task-copy"><b>${i[1]}</b><span>${i[2]}</span></span><span class="done-dot">✓</span></button>`).join('')}</div></section>`}).join('')+(n?'':'<div class="empty">没有匹配的内容</div>');document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>openPage(b.dataset.page))}
  function current(){return items().find(x=>x.item[0]===state.page)||items()[0]}
  function chrome(){const d=DAYS[state.date],cur=current(),list=items(),idx=list.findIndex(x=>x.item[0]===state.page),done=completed.has(k(state.date,state.page)),video=!!cur.item[3],count=list.filter(x=>completed.has(k(state.date,x.item[0]))).length;$('#catalogDate').textContent=d.full;$('#catalogLabel').textContent=d.label;$('#catalogCount').textContent=`${list.length} CH.`;$('#crumbDate').textContent=d.full;$('#crumbGroup').textContent=cur.group;$('#currentTitle').textContent=cur.item[1];$('#chapter').textContent=`${String(idx+1).padStart(2,'0')} / ${String(list.length).padStart(2,'0')}`;$('#complete').classList.toggle('done',done);$('#complete').innerHTML=done?'✓ <span class="text">已完成</span>':'✓ <span class="text">标记完成</span>';$('#prev').disabled=idx===0;$('#next').disabled=idx===list.length-1;$('#standalone').href=`${d.source}#${state.page}`;$('#video').hidden=!video;$('#progressText').textContent=`${count} / ${list.length}`;$('#progressFill').style.width=`${count/list.length*100}%`;document.title=`${cur.item[1]} · 学习档案`}
  function load(){clearTimeout(loadTimer);loading.classList.remove('hide');frame.src=`${DAYS[state.date].source}?embed=1&page=${encodeURIComponent(state.page)}#${state.page}`;loadTimer=setTimeout(()=>{loading.classList.add('hide');toast('加载超时，请重新选择当前章节')},12000)}
  function route(){history.replaceState(null,'',`#${state.date}/${state.page}`)}function closeNav(){navShell.classList.remove('open');mask.classList.remove('show')}
  function openPage(p){state.page=p;drawTasks($('#search').value);chrome();load();route();closeNav()}function changeDate(d){state.date=d;state.page=items(d)[0].item[0];$('#search').value='';drawDates();drawTasks();chrome();load();route();closeNav()}
  function move(v){const list=items(),i=list.findIndex(x=>x.item[0]===state.page),x=list[i+v];if(x)openPage(x.item[0])}function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1300)}
  $('#complete').onclick=()=>{const id=k(state.date,state.page);completed.has(id)?completed.delete(id):completed.add(id);localStorage.setItem('promptArchive.done',JSON.stringify([...completed]));drawTasks($('#search').value);chrome();toast(completed.has(id)?'已标记完成':'已取消标记')};$('#prev').onclick=()=>move(-1);$('#next').onclick=()=>move(1);$('#search').oninput=e=>drawTasks(e.target.value);frame.onload=()=>{clearTimeout(loadTimer);loading.classList.add('hide')};$('#menu').onclick=()=>{navShell.classList.add('open');mask.classList.add('show')};$('#closeNav').onclick=closeNav;mask.onclick=closeNav;window.onhashchange=()=>{readHash();drawDates();drawTasks();chrome();load()};
  readHash();drawDates();drawTasks();chrome();load();
</script>
</body>
</html>
